services:
  postgres:
    image: postgres:16
    container_name: feature-request-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feature_requests
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: feature-request-backend
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"

  frontend:
    build: ./feature-request-frontend
    container_name: feature-request-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data: